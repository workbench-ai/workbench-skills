interface:
  display_name: "Workbench CLI"
  short_description: "Create evals, configure, run, inspect, compare, improve, and export Workbench projects with workbench"
  default_prompt: "Use the Workbench CLI as the cloud-first Workbench interface. Verify workbench is installed before using it; if it is missing, install @workbench-ai/workbench-cli from GitHub Packages and stop cleanly if npm lacks @workbench-ai package access. For hosted projects authenticate with workbench login through the Workbench web portal, use WORKBENCH_API_URL only to override the server URL, create or select a hosted project with workbench launch or workbench link, author eval specs from existing workflows or artifacts using references/docs/evals, list hosted environments with workbench envs list, create project-specific Dockerfile environments with workbench envs create when needed, sync local source with workbench sync, run hosted eval/improve/compare workflows, inspect candidates, preview files, and pull selected candidates. Use workbench dev only for explicit local development."
